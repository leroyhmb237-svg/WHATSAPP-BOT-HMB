<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Bot</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 420px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .status {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .online { background: #00c853; color: black; }
        .offline { background: #d50000; }
        .connecting { background: #ffab00; color: black; }

        .qr-box {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 12px;
        }

        .qr-box img {
            width: 220px;
            margin-top: 10px;
        }

        .hidden { display: none; }
    </style>
</head>

<body>
<div class="container">
    <h1>🤖 WhatsApp Bot</h1>

    <div id="status" class="status offline">⏳ Waiting...</div>

    <div id="qr-box" class="qr-box hidden">
        <h3>Scan QR Code</h3>
        <p>WhatsApp → Linked Devices</p>
        <img id="qr" />
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    let socket;

    function connectSocket() {
        socket = io({
            reconnection: true,
            reconnectionAttempts: Infinity,
            reconnectionDelay: 2000
        });

        socket.on('connect', () => {
            console.log('Connected UI');
        });

        socket.on('qr', (qr) => {
            document.getElementById('status').className = 'status connecting';
            document.getElementById('status').textContent = 'QR Ready...';

            document.getElementById('qr-box').classList.remove('hidden');
            document.getElementById('qr').src = qr;
        });

        socket.on('connected', () => {
            document.getElementById('status').className = 'status online';
            document.getElementById('status').textContent = '✅ Connected';

            document.getElementById('qr-box').classList.add('hidden');
        });

        socket.on('disconnect', () => {
            document.getElementById('status').className = 'status offline';
            document.getElementById('status').textContent = '❌ Disconnected';
        });
    }

    connectSocket();
</script>
</body>
  </html>
