services:
  - type: web
    name: whatsapp-human-bot
    runtime: node
    plan: free

    buildCommand: npm install
    startCommand: node src/index.js

    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production

      # ⚠️ IMPORTANT FIX: Render FS volatile
      - key: AUTH_PATH
        value: ./auth_info_baileys

      - key: MAX_DAILY_MESSAGES
        value: "100"

      - key: NIGHT_MODE
        value: "true"
